<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="cutbar-app-title cutbar-app-desc">
  <title id="cutbar-app-title">CutBar app icon</title>
  <desc id="cutbar-app-desc">macOS rounded-square icon: forest gradient background with a centered cream fork whose tines form a rising lime bar chart.</desc>
  <defs>
    <linearGradient id="cutbar-app-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a9676"/>
      <stop offset="55%" stop-color="#3d755d"/>
      <stop offset="100%" stop-color="#24523f"/>
    </linearGradient>
    <linearGradient id="cutbar-app-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cutbar-app-mask">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cutbar-app-mask)">
    <rect width="1024" height="1024" fill="url(#cutbar-app-bg)"/>
    <rect width="1024" height="540" fill="url(#cutbar-app-sheen)"/>

    <g transform="translate(64 71) scale(14)">
      <rect x="14" y="18" width="8" height="12" rx="1.6" fill="#e4f222"/>
      <rect x="28" y="12" width="8" height="18" rx="1.6" fill="#e4f222"/>
      <rect x="42" y="6"  width="8" height="24" rx="1.6" fill="#e4f222"/>
      <rect x="12" y="28" width="40" height="5"  rx="1.6" fill="#f5f3ed"/>
      <rect x="27" y="33" width="10" height="24" rx="3"   fill="#f5f3ed"/>
    </g>
  </g>
</svg>
