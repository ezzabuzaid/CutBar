name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: macos-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag and derive metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '$TAG'. Expected v<semver>, for example v1.2.3 or v1.2.3-rc.1." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          IS_PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Require tag commit ancestry from main
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit $GITHUB_SHA is not reachable from origin/main." >&2
            exit 1
          fi

  build_and_notarize:
    name: Build and Notarize
    runs-on: macos-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_PROFILE_SECRET: ${{ secrets.NOTARY_PROFILE }}
      SIGNING_IDENTITY_SECRET: ${{ secrets.SIGNING_IDENTITY }}
      SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      SPARKLE_VERSION: "2.6.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_secrets=(
            MACOS_CERT_P12_BASE64
            MACOS_CERT_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          if [[ "$IS_PRERELEASE" != "true" ]]; then
            required_secrets+=(
              SPARKLE_ED_PUBLIC_KEY
              SPARKLE_ED_PRIVATE_KEY
            )
          fi

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/cutbar-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cutbar-signing.p12"

          if ! echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" /Library/Keychains/System.keychain
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install asset-generation toolchain
        shell: bash
        run: brew install librsvg

      - name: Install Sparkle CLI tools
        shell: bash
        run: |
          set -euo pipefail
          SPARKLE_DIR="$RUNNER_TEMP/sparkle"
          mkdir -p "$SPARKLE_DIR"
          curl -fsSL -o "$SPARKLE_DIR/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar -xf "$SPARKLE_DIR/sparkle.tar.xz" -C "$SPARKLE_DIR"
          test -x "$SPARKLE_DIR/bin/sign_update"
          echo "SPARKLE_BIN_DIR=$SPARKLE_DIR/bin" >> "$GITHUB_ENV"

      - name: Write Sparkle private key to file
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/sparkle-ed-private.key"
          umask 077
          printf "%s" "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          echo "SPARKLE_ED_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Configure notarytool profile
        shell: bash
        run: |
          set -euo pipefail

          NOTARY_PROFILE="${NOTARY_PROFILE_SECRET:-CutBar}"
          echo "NOTARY_PROFILE=$NOTARY_PROFILE" >> "$GITHUB_ENV"

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package
        shell: bash
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [[ -n "${SIGNING_IDENTITY_SECRET:-}" ]]; then
            export SIGNING_IDENTITY="$SIGNING_IDENTITY_SECRET"
          fi

          ./scripts/release.sh "$VERSION"

      - name: Verify expected artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -f "dist/CutBar-${VERSION}.dmg"
          test -f "dist/CutBar-${VERSION}.app.zip"
          if [[ "$IS_PRERELEASE" != "true" ]]; then
            test -f "dist/CutBar-${VERSION}.dmg.ed"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cutbar-release-${{ needs.prepare.outputs.version }}
          path: |
            dist/CutBar-${{ needs.prepare.outputs.version }}.dmg
            dist/CutBar-${{ needs.prepare.outputs.version }}.app.zip
            dist/CutBar-${{ needs.prepare.outputs.version }}.dmg.ed
          if-no-files-found: warn

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_and_notarize
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: cutbar-release-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Compute artifact checksums
        id: checksums
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          DMG_SHA="$(shasum -a 256 "dist/CutBar-${VERSION}.dmg" | awk '{print $1}')"
          ZIP_SHA="$(shasum -a 256 "dist/CutBar-${VERSION}.app.zip" | awk '{print $1}')"
          echo "dmg_sha=$DMG_SHA" >> "$GITHUB_OUTPUT"
          echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast.xml
        id: appcast
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          APPCAST=appcast.xml
          PUB_DATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          CUR_SIG_LINE="$(cat "dist/CutBar-${VERSION}.dmg.ed")"
          CUR_ENCL_URL="https://github.com/${REPO}/releases/download/${CURRENT_TAG}/CutBar-${VERSION}.dmg"
          CUR_NOTES_URL="https://github.com/${REPO}/releases/tag/${CURRENT_TAG}"

          {
            printf '<?xml version="1.0" encoding="utf-8"?>\n'
            printf '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n'
            printf '  <channel>\n'
            printf '    <title>CutBar</title>\n'
            printf '    <link>https://github.com/%s</link>\n' "$REPO"
            printf '    <description>Quiet meal tracking for your menu bar.</description>\n'
            printf '    <language>en</language>\n'
            printf '    <item>\n'
            printf '      <title>Version %s</title>\n' "$VERSION"
            printf '      <pubDate>%s</pubDate>\n' "$PUB_DATE"
            printf '      <sparkle:version>%s</sparkle:version>\n' "$VERSION"
            printf '      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n' "$VERSION"
            printf '      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n'
            printf '      <sparkle:releaseNotesLink>%s</sparkle:releaseNotesLink>\n' "$CUR_NOTES_URL"
            printf '      <enclosure url="%s" type="application/octet-stream" %s />\n' "$CUR_ENCL_URL" "$CUR_SIG_LINE"
            printf '    </item>\n'
          } > "$APPCAST"

          # Historical entries: up to 10 prior stable releases that published a .ed sidecar.
          mapfile -t PRIOR_TAGS < <(
            gh release list --repo "$REPO" --exclude-drafts --exclude-pre-releases --limit 20 \
              --json tagName -q '.[].tagName' \
              | grep -Ev "^${CURRENT_TAG}\$" \
              | head -n 10
          )

          for tag in "${PRIOR_TAGS[@]}"; do
            [[ -n "$tag" ]] || continue
            prior_ver="${tag#v}"
            prior_dir="$RUNNER_TEMP/prior-$prior_ver"
            mkdir -p "$prior_dir"

            if ! gh release download "$tag" --repo "$REPO" --pattern "CutBar-${prior_ver}.dmg.ed" --dir "$prior_dir" >/dev/null 2>&1; then
              echo "Skipping $tag: no .ed sidecar attached."
              continue
            fi

            prior_sig="$(cat "$prior_dir/CutBar-${prior_ver}.dmg.ed")"
            prior_pub="$(gh release view "$tag" --repo "$REPO" --json publishedAt -q '.publishedAt')"
            prior_pub_fmt="$(date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$prior_pub" '+%a, %d %b %Y %H:%M:%S +0000' 2>/dev/null || echo "$PUB_DATE")"
            prior_url="https://github.com/${REPO}/releases/download/${tag}/CutBar-${prior_ver}.dmg"
            prior_notes="https://github.com/${REPO}/releases/tag/${tag}"

            {
              printf '    <item>\n'
              printf '      <title>Version %s</title>\n' "$prior_ver"
              printf '      <pubDate>%s</pubDate>\n' "$prior_pub_fmt"
              printf '      <sparkle:version>%s</sparkle:version>\n' "$prior_ver"
              printf '      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n' "$prior_ver"
              printf '      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n'
              printf '      <sparkle:releaseNotesLink>%s</sparkle:releaseNotesLink>\n' "$prior_notes"
              printf '      <enclosure url="%s" type="application/octet-stream" %s />\n' "$prior_url" "$prior_sig"
              printf '    </item>\n'
            } >> "$APPCAST"
          done

          {
            printf '  </channel>\n'
            printf '</rss>\n'
          } >> "$APPCAST"

          mv "$APPCAST" "dist/$APPCAST"
          echo "appcast_path=dist/$APPCAST" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from Conventional Commits
        shell: bash
        env:
          CURRENT_TAG: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
          DMG_SHA: ${{ steps.checksums.outputs.dmg_sha }}
          ZIP_SHA: ${{ steps.checksums.outputs.zip_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          PREVIOUS_TAG="$(
            git tag --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
              | grep -v "^${CURRENT_TAG}$" \
              | head -n1 || true
          )"

          if [[ -n "$PREVIOUS_TAG" ]]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          ADDED_FILE="$RUNNER_TEMP/release-added.txt"
          CHANGED_FILE="$RUNNER_TEMP/release-changed.txt"
          FIXED_FILE="$RUNNER_TEMP/release-fixed.txt"
          BREAKING_FILE="$RUNNER_TEMP/release-breaking.txt"
          OTHER_FILE="$RUNNER_TEMP/release-other.txt"
          : > "$ADDED_FILE"
          : > "$CHANGED_FILE"
          : > "$FIXED_FILE"
          : > "$BREAKING_FILE"
          : > "$OTHER_FILE"
          CONVENTIONAL_REGEX='^([a-z]+)(\([^)]+\))?(!)?:[[:space:]]+(.+)$'

          while IFS= read -r subject; do
            if [[ "$subject" =~ $CONVENTIONAL_REGEX ]]; then
              commit_type="${BASH_REMATCH[1]}"
              scope="${BASH_REMATCH[2]}"
              bang="${BASH_REMATCH[3]}"
              description="${BASH_REMATCH[4]}"

              line="- ${description}"
              if [[ -n "$scope" ]]; then
                line="- ${scope}: ${description}"
              fi

              if [[ -n "$bang" ]]; then
                printf "%s\n" "$line" >> "$BREAKING_FILE"
              fi

              case "$commit_type" in
                feat)
                  printf "%s\n" "$line" >> "$ADDED_FILE"
                  ;;
                fix|perf)
                  printf "%s\n" "$line" >> "$FIXED_FILE"
                  ;;
                refactor|build|ci|docs|style|test|chore)
                  printf "%s\n" "$line" >> "$CHANGED_FILE"
                  ;;
                *)
                  printf -- "- %s\n" "$subject" >> "$OTHER_FILE"
                  ;;
              esac
            else
              printf -- "- %s\n" "$subject" >> "$OTHER_FILE"
            fi
          done < <(git log --pretty=format:'%s' "$RANGE")

          append_section() {
            local title="$1"
            local file="$2"
            if [[ -s "$file" ]]; then
              {
                echo "### ${title}"
                cat "$file"
                echo
              } >> release_notes.md
            fi
          }

          HERO_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${CURRENT_TAG}/branding/generated/hero.png"

          {
            echo "<p align=\"center\">"
            echo "  <img src=\"${HERO_URL}\" alt=\"CutBar\" width=\"480\" />"
            echo "</p>"
            echo
            echo "> Quiet meal tracking that lives in your menu bar."
            echo
            echo "## What Changed"
            echo
          } > release_notes.md

          append_section "Added" "$ADDED_FILE"
          append_section "Changed" "$CHANGED_FILE"
          append_section "Fixed" "$FIXED_FILE"
          append_section "Breaking Changes" "$BREAKING_FILE"
          append_section "Other" "$OTHER_FILE"

          if [[ ! -s "$ADDED_FILE" && ! -s "$CHANGED_FILE" && ! -s "$FIXED_FILE" && ! -s "$BREAKING_FILE" && ! -s "$OTHER_FILE" ]]; then
            {
              echo "- Internal maintenance updates."
              echo
            } >> release_notes.md
          fi

          {
            echo "## Install"
            echo
            echo "1. Download \`CutBar-${VERSION}.dmg\` below."
            echo "2. Open the DMG and drag **CutBar** to your Applications folder."
            echo "3. Launch from Spotlight or Applications — CutBar lives in your menu bar."
            echo
            echo "## System Requirements"
            echo
            echo "- macOS 14 Sonoma or later"
            echo "- Apple Silicon or Intel (universal binary)"
            echo
            echo "## Verify Authenticity"
            echo
            echo "The app and DMG are signed with a Developer ID certificate and notarized by Apple."
            echo
            echo '```bash'
            echo "# Verify Gatekeeper accepts the app"
            echo "spctl -a -vvv /Applications/CutBar.app"
            echo
            echo "# Inspect the signature"
            echo "codesign -dvv /Applications/CutBar.app"
            echo
            echo "# Confirm checksums (macOS)"
            echo "shasum -a 256 ~/Downloads/CutBar-${VERSION}.dmg"
            echo "shasum -a 256 ~/Downloads/CutBar-${VERSION}.app.zip"
            echo '```'
            echo
            echo "## Assets"
            echo
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            echo "| \`CutBar-${VERSION}.dmg\` | \`${DMG_SHA}\` |"
            echo "| \`CutBar-${VERSION}.app.zip\` | \`${ZIP_SHA}\` |"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "## Full Changelog"
              echo
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            fi
          } >> release_notes.md

      - name: Stage stable-only assets
        id: stage_assets
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "extra_files=" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'extra_files<<EOF'
              echo "dist/CutBar-${VERSION}.dmg.ed"
              echo "dist/appcast.xml"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: CutBar ${{ needs.prepare.outputs.version }}
          body_path: release_notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          files: |
            dist/CutBar-${{ needs.prepare.outputs.version }}.dmg
            dist/CutBar-${{ needs.prepare.outputs.version }}.app.zip
            ${{ steps.stage_assets.outputs.extra_files }}
          fail_on_unmatched_files: true
          overwrite_files: true
