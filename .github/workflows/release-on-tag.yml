name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: macos-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and derive metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '$TAG'. Expected v<semver>, for example v1.2.3 or v1.2.3-rc.1." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          IS_PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Require tag commit ancestry from main
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --prune
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit $GITHUB_SHA is not reachable from origin/main." >&2
            exit 1
          fi

  build_and_notarize:
    name: Build and Notarize
    runs-on: macos-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_PROFILE_SECRET: ${{ secrets.NOTARY_PROFILE }}
      SIGNING_IDENTITY_SECRET: ${{ secrets.SIGNING_IDENTITY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_secrets=(
            MACOS_CERT_P12_BASE64
            MACOS_CERT_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/cutbar-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cutbar-signing.p12"

          if ! echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" /Library/Keychains/System.keychain
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        shell: bash
        run: |
          set -euo pipefail

          NOTARY_PROFILE="${NOTARY_PROFILE_SECRET:-CutBar}"
          echo "NOTARY_PROFILE=$NOTARY_PROFILE" >> "$GITHUB_ENV"

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package
        shell: bash
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [[ -n "${SIGNING_IDENTITY_SECRET:-}" ]]; then
            export SIGNING_IDENTITY="$SIGNING_IDENTITY_SECRET"
          fi

          ./scripts/release.sh "$VERSION"

      - name: Verify expected artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -f "dist/CutBar-${VERSION}.dmg"
          test -f "dist/CutBar-${VERSION}.app.zip"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cutbar-release-${{ needs.prepare.outputs.version }}
          path: |
            dist/CutBar-${{ needs.prepare.outputs.version }}.dmg
            dist/CutBar-${{ needs.prepare.outputs.version }}.app.zip
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_and_notarize
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: cutbar-release-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            dist/CutBar-${{ needs.prepare.outputs.version }}.dmg
            dist/CutBar-${{ needs.prepare.outputs.version }}.app.zip
          fail_on_unmatched_files: true
          overwrite_files: true
